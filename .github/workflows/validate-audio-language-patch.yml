name: Validate audio-language patch

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out compatibility repository
        uses: actions/checkout@v4

      - name: Check out upstream stream-server
        uses: actions/checkout@v4
        with:
          repository: perpetus/stream-server
          path: upstream

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Apply deterministic audio-language changes
        run: python3 apply_audio_language_patch.py upstream

      - name: Verify idempotence
        run: python3 apply_audio_language_patch.py upstream

      - name: Check enginefs
        working-directory: upstream
        run: cargo check --quiet --locked -p enginefs
